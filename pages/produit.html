<!-- Fichier: /frontend/pages/produit.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produit — SneakX</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/accessibility.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .prod-wrap { padding: 90px 60px 60px; max-width: 1200px; margin: 0 auto; }
        .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 36px; font-size: 12px; color: var(--text2); }
        .breadcrumb a { color: var(--text2); transition: color .2s; }
        .breadcrumb a:hover { color: var(--orange); }
        .breadcrumb i { font-size: 10px; }

        /* LAYOUT */
        .prod-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: flex-start; margin-bottom: 60px; }

        /* GALLERY */
        .gallery { position: sticky; top: 100px; }
        .main-img-wrap { border-radius: 20px; overflow: hidden; background: var(--bg3); border: 1px solid var(--border); height: 480px; position: relative; }
        .main-img-wrap img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
        .main-img-wrap:hover img { transform: scale(1.03); }
        .img-badge { position: absolute; top: 16px; left: 16px; background: var(--orange); color: #fff; padding: 5px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; letter-spacing: 1px; }
        .thumbs { display: flex; gap: 10px; margin-top: 12px; }
        .thumb { width: 76px; height: 76px; border-radius: 10px; overflow: hidden; border: 2px solid var(--border); cursor: pointer; transition: border-color .2s; flex-shrink: 0; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .thumb:hover, .thumb.active { border-color: var(--orange); }
        .gallery-actions { display: flex; gap: 10px; margin-top: 14px; }
        .gal-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg3); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 7px; }
        .gal-btn:hover { border-color: var(--orange-border); color: var(--orange); }

        /* PRODUCT INFO */
        .prod-info {}
        .prod-brand { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--orange); margin-bottom: 8px; }
        .prod-name { font-family: 'Barlow Condensed', sans-serif; font-size: 44px; font-weight: 900; text-transform: uppercase; letter-spacing: -1.5px; line-height: 1; color: var(--text); margin-bottom: 14px; }
        .prod-rating { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .stars-lg { color: #FFB800; font-size: 18px; letter-spacing: 2px; }
        .rating-count { color: var(--text2); font-size: 13px; }
        .prod-price-row { display: flex; align-items: baseline; gap: 14px; margin-bottom: 8px; }
        .prod-price { font-family: 'Barlow Condensed', sans-serif; font-size: 44px; font-weight: 900; color: var(--orange); line-height: 1; }
        .prod-old { font-size: 20px; color: var(--text3); text-decoration: line-through; }
        .prod-discount { background: rgba(16,185,129,.15); color: #10b981; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 800; }
        .prod-stock { display: inline-flex; align-items: center; gap: 7px; margin-bottom: 24px; font-size: 13px; font-weight: 600; padding: 6px 14px; border-radius: 8px; }
        .stock-in { background: rgba(16,185,129,.12); color: #10b981; }
        .stock-low { background: rgba(245,158,11,.12); color: #f59e0b; }
        .stock-out { background: rgba(239,68,68,.12); color: #ef4444; }
        .prod-desc { color: var(--text2); font-size: 14px; line-height: 1.8; margin-bottom: 28px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }

        /* SIZE SELECTOR */
        .sizes-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 12px; }
        .sizes-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
        .size-btn { width: 48px; height: 48px; border-radius: 10px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; }
        .size-btn:hover { border-color: var(--orange); color: var(--text); }
        .size-btn.selected { border-color: var(--orange); background: var(--orange); color: #fff; }
        .size-btn.unavailable { opacity: .3; cursor: not-allowed; text-decoration: line-through; }

        /* QTY + CTA */
        .qty-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .qty-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); }
        .qty-ctrl { display: flex; align-items: center; border: 1px solid var(--border2); border-radius: 10px; overflow: hidden; }
        .qty-btn { width: 40px; height: 40px; background: var(--bg3); border: none; color: var(--text2); font-size: 14px; cursor: pointer; transition: all .2s; }
        .qty-btn:hover { background: var(--bg4); color: var(--text); }
        .qty-input { width: 50px; height: 40px; background: transparent; border: none; text-align: center; color: var(--text); font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 800; outline: none; }
        .cta-row { display: flex; gap: 12px; margin-bottom: 20px; }
        .cta-cart { flex: 1; background: var(--orange); color: #fff; border: none; padding: 16px 24px; border-radius: 10px; font-size: 13px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all .25s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .cta-cart:hover { background: var(--orange-light); transform: translateY(-2px); box-shadow: 0 12px 30px rgba(255,92,0,.35); }
        .cta-cart:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
        .cta-wish { width: 54px; height: 54px; border-radius: 10px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-size: 18px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; }
        .cta-wish:hover, .cta-wish.active { border-color: #ef4444; color: #ef4444; background: rgba(239,68,68,.08); }

        /* FEATURES */
        .prod-feats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
        .feat-item { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text2); }
        .feat-item i { color: var(--orange); font-size: 14px; width: 20px; }

        /* TABS */
        .tabs-bar { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 32px; gap: 0; }
        .tab-btn { padding: 14px 24px; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border: none; background: transparent; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .2s; }
        .tab-btn.active, .tab-btn:hover { color: var(--text); }
        .tab-btn.active { border-bottom-color: var(--orange); color: var(--orange); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .specs-table { width: 100%; border-collapse: collapse; }
        .specs-table tr { border-bottom: 1px solid var(--border); }
        .specs-table tr:last-child { border-bottom: none; }
        .specs-table td { padding: 14px 16px; font-size: 13px; }
        .specs-table td:first-child { color: var(--text2); font-weight: 600; width: 40%; }

        /* LOADING */
        .center-spin { display: flex; justify-content: center; align-items: center; padding: 80px; }
        .error-box { text-align: center; padding: 60px; }
        .error-box i { font-size: 48px; color: var(--text3); display: block; margin-bottom: 16px; }

        @media (max-width:1024px) { .prod-wrap{padding:80px 30px 40px} .prod-layout{grid-template-columns:1fr;gap:40px} .gallery{position:static} }
        @media (max-width:640px) { .prod-wrap{padding:80px 16px 30px} .prod-name{font-size:32px} .prod-price{font-size:32px} .cta-row{flex-direction:column} .main-img-wrap{height:300px} .prod-feats{grid-template-columns:1fr} }
    </style>
</head>
<body>
    <div id="sx-header-placeholder"></div>

    <div class="prod-wrap">
        <div class="breadcrumb reveal">
            <a href="index.html"><i class="fas fa-home"></i> Accueil</a>
            <i class="fas fa-chevron-right"></i>
            <a href="catalogue.html">Catalogue</a>
            <i class="fas fa-chevron-right"></i>
            <span id="breadName" style="color:var(--text)">Produit</span>
        </div>

        <div id="prodContainer">
            <div class="center-spin"><div class="sx-spinner"></div></div>
        </div>
    </div>

    <script type="module">
        import { init, showToast, isAuthenticated } from '../assets/js/modules/sx-shared.js';
        import API from '../assets/js/modules/api.js';

        init('catalogue');

        const FALLBACK_IMGS = [
            'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=700&q=85',
            'https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=700&q=85',
            'https://images.unsplash.com/photo-1600269452121-4f2416e55c28?w=700&q=85',
            'https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=700&q=85',
        ];
        const THUMB_IMGS = [
            'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200&q=75',
            'https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=200&q=75',
            'https://images.unsplash.com/photo-1600269452121-4f2416e55c28?w=200&q=75',
            'https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=200&q=75',
        ];

        let product = null;
        let quantity = 1;
        let selectedSize = null;

        window.addEventListener('DOMContentLoaded', async () => {
            // Get product slug or id from URL
            const params = new URLSearchParams(window.location.search);
            const slug   = params.get('slug');
            const id     = params.get('id');
            if (!slug && !id) { window.location.href = 'catalogue.html'; return; }
            await loadProduct(slug || id, !!slug);
        });

        async function loadProduct(identifier, isSlug = true) {
            const c = document.getElementById('prodContainer');
            try {
                const res = await API.produits.detail(identifier);
                const p   = res?.produit || res?.product;
                if (!p) throw new Error('Not found');

                // Normalize response to expected product shape
                const imgs = (p.images || []);
                product = {
                    id:              p.id,
                    name:            p.nom || p.name,
                    brand:           p.marque || p.brand,
                    category_name:   p.categorie_nom || p.category_name,
                    description:     p.description,
                    price:           parseFloat(p.prix || p.price || 0),
                    promo_price:     (p.prix_promo || p.promo_price) ? parseFloat(p.prix_promo || p.promo_price) : null,
                    stock:           parseInt(p.stock || 0),
                    images:          imgs.length ? imgs.map(url => typeof url==='string'?{url}:url) : [
                        {url:'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=700&q=85'},
                        {url:'https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=700&q=85'},
                        {url:'https://images.unsplash.com/photo-1600269452121-4f2416e55c28?w=700&q=85'},
                        {url:'https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=700&q=85'},
                    ],
                    sizes:           p.tailles || p.sizes || ['38','39','40','41','42','43','44','45'],
                    colors:          p.couleurs || p.colors || [],
                    average_rating:  parseFloat(p.note_moyenne || p.average_rating || 4.5),
                    reviews_count:   parseInt(p.nb_avis || p.reviews_count || 0),
                    reviews:         p.avis || p.reviews || [],
                    similaires:      p.similaires || [],
                    vues:            p.vues || 0,
                    ventes:          p.ventes || 0,
                    slug:            p.slug,
                };

                document.title = `${product.name} — SneakX`;
                document.getElementById('breadName').textContent = product.name;
                render();
            } catch(e) {
                c.innerHTML = `<div class="error-box"><i class="fas fa-exclamation-circle"></i>
                    <h3 style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;text-transform:uppercase;color:var(--text)">Produit introuvable</h3>
                    <p style="color:var(--text2);margin:10px 0 20px">Ce produit n'existe pas ou n'est plus disponible.</p>
                    <button class="sx-btn sx-btn-orange" onclick="window.location.href='catalogue.html'"><i class="fas fa-arrow-left"></i> Retour au catalogue</button>
                </div>`;
            }
        }

        function render() {
            const hasPromo = product.promo_price && product.promo_price < product.price;
            const price    = hasPromo ? product.promo_price : product.price;
            const discount = hasPromo ? Math.round((1 - product.promo_price / product.price) * 100) : 0;
            const mainImg  = product.images?.[0]?.url || FALLBACK_IMGS[0];
            const stockCls = product.stock > 10 ? 'stock-in' : product.stock > 0 ? 'stock-low' : 'stock-out';
            const stockTxt = product.stock > 10 ? '<i class="fas fa-check"></i> En stock'
                : product.stock > 0 ? `<i class="fas fa-exclamation-triangle"></i> Plus que ${product.stock} en stock`
                : '<i class="fas fa-times"></i> Rupture de stock';
            const thumbs = product.images?.length > 1
                ? product.images.map((img,i) => `<div class="thumb ${i===0?'active':''}" onclick="changeImg('${img.url}',this)"><img src="${img.url}" alt="Vue ${i+1}"></div>`).join('')
                : THUMB_IMGS.map((u,i) => `<div class="thumb ${i===0?'active':''}" onclick="changeImg('${FALLBACK_IMGS[i]||FALLBACK_IMGS[0]}',this)"><img src="${u}" alt="Vue ${i+1}"></div>`).join('');
            const stars = product.average_rating > 0
                ? '★'.repeat(Math.round(product.average_rating)) + '☆'.repeat(5 - Math.round(product.average_rating))
                : '★★★★★';

            // Tailles depuis PHP
            const SIZES_TO_USE = product.sizes?.length ? product.sizes.map(String) : ['38','39','40','41','42','43','44','45'];
            const sizesHtml    = SIZES_TO_USE.map(s => `<button class="size-btn" onclick="selectSize('${s}',this)">${s}</button>`).join('');
            // Couleurs
            const colorsHtml   = product.colors?.length
                ? `<div class="sizes-label" style="margin-top:16px">Couleur <span id="selectedColorLabel" style="color:var(--text3);font-weight:400;margin-left:4px"></span></div>
                   <div class="sizes-grid">${product.colors.map(c => `<button class="size-btn" style="font-size:11px;padding:4px 8px;width:auto;height:auto" onclick="selectColor('${c}',this)">${c}</button>`).join('')}</div>` : '';
            // Avis
            const avisHtml = product.reviews?.length
                ? product.reviews.map(r => `<div style="padding:14px 0;border-bottom:1px solid var(--border)">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
                        <strong style="font-size:13px">${r.auteur || r.user_name || 'Client'}</strong>
                        <span style="color:#FFB800;font-size:12px">${'★'.repeat(r.note || 5)}</span>
                    </div>
                    <p style="color:var(--text2);font-size:13px">${r.commentaire || r.comment || ''}</p>
                </div>`).join('')
                : '<p style="color:var(--text3);font-size:13px">Aucun avis pour l\'instant. Soyez le premier !</p>';

            document.getElementById('prodContainer').innerHTML = `
            <div class="prod-layout">
                <div class="gallery reveal">
                    <div class="main-img-wrap">
                        <img id="mainImg" src="${mainImg}" alt="${product.name}" onerror="this.src='${FALLBACK_IMGS[0]}'">
                        ${hasPromo ? `<div class="img-badge">-${discount}%</div>` : ''}
                    </div>
                    <div class="thumbs">${thumbs}</div>
                    <div class="gallery-actions">
                        <button class="gal-btn" onclick="speakDesc()" title="Écouter la description">
                            <i class="fas fa-volume-up"></i> Écouter la description
                        </button>
                        <button class="gal-btn" onclick="window.location.href='catalogue.html'">
                            <i class="fas fa-th"></i> Catalogue
                        </button>
                    </div>
                </div>

                <div class="prod-info reveal">
                    <div class="prod-brand">${product.brand || product.category_name || 'SneakX'}</div>
                    <div class="prod-name">${product.name}</div>
                    <div class="prod-rating">
                        <span class="stars-lg">${stars}</span>
                        <span class="rating-count">(${product.reviews_count || 0} avis)</span>
                        ${product.vues ? `<span style="color:var(--text3);font-size:12px"> · <i class="fas fa-eye"></i> ${product.vues} vues</span>` : ''}
                    </div>
                    <div class="prod-price-row">
                        <div class="prod-price">${price ? Math.round(price).toLocaleString('fr-FR') + ' XOF' : '—'}</div>
                        ${hasPromo ? `<div class="prod-old">${Math.round(product.price).toLocaleString('fr-FR')} XOF</div><div class="prod-discount">-${discount}%</div>` : ''}
                    </div>
                    <span class="prod-stock ${stockCls}">${stockTxt}</span>
                    <p class="prod-desc">${product.description || 'Description non disponible pour ce produit.'}</p>

                    <div class="sizes-label">Pointure <span style="color:var(--text3);font-weight:400;margin-left:4px" id="selectedSizeLabel"></span></div>
                    <div class="sizes-grid">${sizesHtml}</div>
                    ${colorsHtml}

                    <div class="qty-row">
                        <span class="qty-label">Quantité</span>
                        <div class="qty-ctrl">
                            <button class="qty-btn" onclick="changeQty(-1)"><i class="fas fa-minus"></i></button>
                            <input class="qty-input" type="number" id="qtyInput" value="1" min="1" max="${product.stock||99}" readonly>
                            <button class="qty-btn" onclick="changeQty(1)"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>

                    <div class="cta-row">
                        <button class="cta-cart" id="addCartBtn" onclick="addToCart()" ${product.stock <= 0 ? 'disabled' : ''}>
                            <i class="fas fa-shopping-cart"></i> Ajouter au panier
                        </button>
                        <button class="cta-wish" id="wishBtn" onclick="toggleWish()"><i class="far fa-heart"></i></button>
                    </div>

                    <div class="prod-feats">
                        <div class="feat-item"><i class="fas fa-truck"></i><span>Livraison rapide à Abidjan</span></div>
                        <div class="feat-item"><i class="fas fa-shield-alt"></i><span>Paiement 100% sécurisé</span></div>
                        <div class="feat-item"><i class="fas fa-undo"></i><span>Retours gratuits 30 jours</span></div>
                        <div class="feat-item"><i class="fas fa-headset"></i><span>Support 7j/7</span></div>
                    </div>
                </div>
            </div>

            <!-- TABS : Description / Specs / Avis -->
            <div class="tabs-bar">
                <button class="tab-btn active" onclick="switchTab('desc',this)">Description</button>
                <button class="tab-btn" onclick="switchTab('avis',this)">Avis (${product.reviews_count || 0})</button>
                ${product.similaires?.length ? '<button class="tab-btn" onclick="switchTab('sim',this)">Produits similaires</button>' : ''}
            </div>
            <div id="tab-desc" class="tab-content active">
                <p style="color:var(--text2);font-size:14px;line-height:1.9">${product.description || 'Aucune description disponible.'}</p>
                ${product.sizes?.length ? `<p style="margin-top:16px;font-size:13px;color:var(--text2)"><strong style="color:var(--text)">Tailles disponibles :</strong> ${product.sizes.join(', ')}</p>` : ''}
                ${product.colors?.length ? `<p style="font-size:13px;color:var(--text2)"><strong style="color:var(--text)">Couleurs :</strong> ${product.colors.join(', ')}</p>` : ''}
            </div>
            <div id="tab-avis" class="tab-content">
                ${avisHtml}
            </div>
            <div id="tab-sim" class="tab-content">
                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-top:16px">
                    ${(product.similaires||[]).map(p => `
                    <div class="sx-product-card" onclick="window.location.href='produit.html?slug=${p.slug}'">
                        <div class="sx-product-img" style="height:160px">
                            <img src="${p.image||''}" alt="${p.nom}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">
                        </div>
                        <div class="sx-product-body">
                            <div class="sx-product-name">${p.nom}</div>
                            <div class="sx-product-footer">
                                <span class="sx-product-price">${Math.round(p.prix_promo||p.prix).toLocaleString('fr-FR')} XOF</span>
                            </div>
                        </div>
                    </div>`).join('')}
                </div>
            </div>`;
        }


        window.changeImg = function(url, el) {
            document.getElementById('mainImg').src = url;
            document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
            if (el) el.classList.add('active');
        };

        window.selectSize = function(size, btn) {
            selectedSize = size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            document.getElementById('selectedSizeLabel').textContent = `— ${size}`;
        };

        window.changeQty = function(delta) {
            const input = document.getElementById('qtyInput');
            let val = parseInt(input.value) + delta;
            val = Math.max(1, Math.min(val, product.stock || 99));
            quantity = val;
            input.value = val;
        };

        window.addToCart = async function() {
            if (!selectedSize) { showToast('Veuillez sélectionner une pointure', 'error'); return; }
            const btn = document.getElementById('addCartBtn');
            if (btn) { btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Ajout...'; btn.disabled = true; }
            try {
                const selectedColor = document.querySelector('.size-btn.selected[data-color]')?.dataset.color || '';
                await API.panier.add(product.id, quantity, selectedSize, selectedColor);
                showToast(`${quantity} × ${product.name} ajouté au panier ✓`, 'success');
                // Update cart badge
                const count = await API.panier.count();
                const badge = document.getElementById('cart-count');
                if (badge) { badge.textContent = count; badge.style.display = count > 0 ? 'flex' : 'none'; }
            } catch {
                showToast(`${quantity} × ${product.name} ajouté (démo)`, 'success');
            } finally {
                if (btn) { btn.innerHTML = '<i class="fas fa-shopping-cart"></i> Ajouter au panier'; btn.disabled = product.stock <= 0; }
            }
        };

        let selectedColor = '';
        window.selectColor = function(color, btn) {
            selectedColor = color;
            document.querySelectorAll('.size-btn[style]').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            const lbl = document.getElementById('selectedColorLabel');
            if (lbl) lbl.textContent = `— ${color}`;
        };

        window.toggleWish = async function() {
            const btn = document.getElementById('wishBtn');
            const i   = btn.querySelector('i');
            try {
                const res = await API.wishlist.toggle(product.id);
                if (res?.action === 'added') {
                    i.className = 'fas fa-heart'; btn.classList.add('active');
                    showToast('Ajouté à la wishlist ❤️', 'success');
                } else {
                    i.className = 'far fa-heart'; btn.classList.remove('active');
                    showToast('Retiré de la wishlist', 'info');
                }
            } catch {
                i.classList.toggle('far'); i.classList.toggle('fas');
                btn.classList.toggle('active');
                showToast(btn.classList.contains('active') ? 'Ajouté à la wishlist' : 'Retiré de la wishlist', 'success');
            }
        };

        window.switchTab = function(tab, el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            const target = document.getElementById(`tab-${tab}`);
            if (target) target.classList.add('active');
        };

        // ── LECTURE AUDIO (SpeechSynthesis API) ──────────
        window.speakDesc = function() {
            if (!product) return;
            // Arrêter la lecture en cours si active
            if (speechSynthesis.speaking) { speechSynthesis.cancel(); return; }

            const texte = `${product.name}, par ${product.brand || 'SneakX'}. ${product.description || 'Aucune description disponible.'}`;
            const utterance = new SpeechSynthesisUtterance(texte);
            utterance.lang  = 'fr-FR';
            utterance.rate  = 0.9;
            utterance.pitch = 1;

            // Essayer de trouver une voix française
            const voices = speechSynthesis.getVoices();
            const frVoice = voices.find(v => v.lang.startsWith('fr'));
            if (frVoice) utterance.voice = frVoice;

            utterance.onstart = () => {
                const btn = document.querySelector('.gal-btn[onclick="speakDesc()"]');
                if (btn) btn.innerHTML = '<i class="fas fa-stop"></i> Arrêter';
            };
            utterance.onend = () => {
                const btn = document.querySelector('.gal-btn[onclick="speakDesc()"]');
                if (btn) btn.innerHTML = '<i class="fas fa-volume-up"></i> Écouter la description';
            };

            speechSynthesis.speak(utterance);
        };
    </script>
</body>
</html>
