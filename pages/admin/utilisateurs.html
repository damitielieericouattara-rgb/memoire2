<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utilisateurs — SneakX Admin</title>
<link rel="stylesheet" href="../../assets/css/admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--orange:#FF5C00;--orange-light:#FF7A2E;--orange-dim:rgba(255,92,0,0.12);--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;--bg:#0D0D0D;--bg2:#141414;--bg3:#1C1C1C;--bg4:#242424;--bg5:#2C2C2C;--text:#FFF;--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.28);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--shadow:0 4px 24px rgba(0,0,0,0.5)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.admin-wrap{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;z-index:100;display:flex;flex-direction:column;overflow-y:auto}
.sb-logo{padding:24px 20px;border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.sb-logo span{color:var(--orange)}
.sb-logo small{display:block;font-size:10px;font-weight:600;letter-spacing:3px;color:var(--text3);margin-top:2px}
.sb-nav{flex:1;padding:12px 0}
.sb-section{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:16px 20px 6px}
.sb-link{display:flex;align-items:center;gap:12px;padding:11px 20px;color:var(--text2);font-size:13px;font-weight:600;transition:.2s;border-left:3px solid transparent}
.sb-link:hover,.sb-link.active{color:var(--text);background:var(--orange-dim);border-left-color:var(--orange)}
.sb-link i{width:16px;text-align:center;color:var(--orange)}
.sb-bottom{padding:16px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:var(--bg3);margin-bottom:10px}
.sb-avatar{width:36px;height:36px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.sb-user-name{font-weight:700;font-size:13px}
.sb-user-role{font-size:10px;color:var(--orange);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.btn-logout{width:100%;padding:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:8px;font-weight:700;font-size:12px;text-transform:uppercase;cursor:pointer;transition:.2s}
.btn-logout:hover{background:rgba(239,68,68,.2)}
.main{flex:1;margin-left:240px;padding:32px 36px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;text-transform:uppercase;letter-spacing:-1px}
.page-title span{color:var(--orange)}
.btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:.2s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:hover{background:var(--orange-light)}
.btn-secondary{background:var(--bg4);border:1px solid var(--border);color:var(--text2)}
.btn-secondary:hover{color:var(--text);background:var(--bg5)}
.btn-sm{padding:5px 10px;font-size:11px}
/* Filters */
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:200px}
.search-box input{width:100%;padding:10px 14px 10px 38px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;transition:.2s}
.search-box input:focus{border-color:var(--orange)}
.search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.filter-select{padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;cursor:pointer}
/* Card table */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;text-transform:uppercase}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
tbody td{padding:13px 14px;font-size:13px;color:var(--text2);border-bottom:1px solid var(--border)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--bg4);color:var(--text)}
.user-cell{display:flex;align-items:center;gap:10px}
.u-avatar{width:34px;height:34px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.u-name{font-weight:700;font-size:13px}
.u-email{font-size:11px;color:var(--text3);margin-top:1px}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.badge-admin{background:rgba(255,92,0,.15);color:var(--orange)}
.badge-client{background:rgba(59,130,246,.12);color:var(--info)}
.badge-livreur{background:rgba(168,85,247,.12);color:#a855f7}
.badge-active{background:rgba(16,185,129,.12);color:var(--success)}
.badge-inactive{background:rgba(245,158,11,.12);color:var(--warning)}
.badge-banned{background:rgba(239,68,68,.12);color:var(--danger)}
/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-top:1px solid var(--border)}
.pag-info{font-size:12px;color:var(--text3)}
.pag-btns{display:flex;gap:6px}
.pag-btn{padding:6px 12px;background:var(--bg4);border:1px solid var(--border);border-radius:7px;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:.2s}
.pag-btn:hover,.pag-btn.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.pag-btn:disabled{opacity:.3;cursor:not-allowed}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:32px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:.3s}
.modal-overlay.open .modal{transform:none}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;text-transform:uppercase}
.modal-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}
.modal-close:hover{color:var(--text)}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);display:block;margin-bottom:6px}
.form-input,.form-select{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;outline:none;transition:.2s}
.form-input:focus,.form-select:focus{border-color:var(--orange)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.flex-end{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
.user-detail-header{display:flex;align-items:center;gap:14px;padding:16px;background:var(--bg4);border-radius:12px;margin-bottom:20px}
.user-detail-avatar{width:52px;height:52px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900}
.user-detail-name{font-weight:800;font-size:16px}
.user-detail-since{font-size:12px;color:var(--text3);margin-top:2px}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-msg{padding:12px 18px;background:var(--bg4);border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);animation:slideIn .3s ease;border-left:3px solid var(--orange)}
.toast-msg.success{border-color:var(--success)}
.toast-msg.error{border-color:var(--danger)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.empty-state{text-align:center;padding:48px;color:var(--text3)}
.empty-state i{font-size:40px;margin-bottom:14px;display:block}
</style>
</head>
<body>
<div class="admin-wrap">
  <aside class="sidebar">
    <div class="sb-logo">Sneak<span>X</span><small>Admin Panel</small></div>
    <nav class="sb-nav">
      <div class="sb-section">Principal</div>
      <a class="sb-link" href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a class="sb-link" href="commandes.html"><i class="fas fa-shopping-cart"></i> Commandes</a>
      <a class="sb-link" href="produits.html"><i class="fas fa-box"></i> Produits</a>
      <div class="sb-section">Gestion</div>
      <a class="sb-link active" href="utilisateurs.html"><i class="fas fa-users"></i> Utilisateurs</a>
      <a class="sb-link" href="analytics.html"><i class="fas fa-chart-bar"></i> Analytics</a>
      <a class="sb-link" href="fraude.html"><i class="fas fa-shield-alt"></i> Anti-fraude</a>
      <div class="sb-section">Site</div>
      <a class="sb-link" href="../dashboard.html"><i class="fas fa-store"></i> Voir la boutique</a>
    </nav>
    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">A</div>
        <div>
          <div class="sb-user-name" id="sb-name">Admin</div>
          <div class="sb-user-role">Administrateur</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Gestion des <span>Utilisateurs</span></div>
        <div style="font-size:13px;color:var(--text2);margin-top:2px" id="user-count">Chargement...</div>
      </div>
    </div>
    <div class="filters">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search" placeholder="Rechercher par nom, email..." oninput="filterUsers()">
      </div>
      <select class="filter-select" id="filter-role" onchange="filterUsers()">
        <option value="">Tous les rôles</option>
        <option value="CLIENT">Clients</option>
        <option value="ADMIN">Admins</option>
        <option value="LIVREUR">Livreurs</option>
      </select>
      <select class="filter-select" id="filter-status" onchange="filterUsers()">
        <option value="">Tous les statuts</option>
        <option value="ACTIVE">Actif</option>
        <option value="INACTIVE">Inactif</option>
        <option value="BANNED">Banni</option>
      </select>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title">Tous les utilisateurs</div>
        <div style="font-size:12px;color:var(--text3)" id="filtered-count"></div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Utilisateur</th><th>Rôle</th><th>Statut</th><th>Inscription</th><th>Actions</th>
          </tr></thead>
          <tbody id="users-tbody">
            <tr><td colspan="5" style="text-align:center;padding:48px;color:var(--text3)"><i class="fas fa-spinner fa-spin" style="font-size:20px"></i></td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="pagination" style="display:none">
        <span class="pag-info" id="pag-info"></span>
        <div class="pag-btns" id="pag-btns"></div>
      </div>
    </div>
  </main>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Modifier l'utilisateur</div>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="user-detail-header">
      <div class="user-detail-avatar" id="m-avatar">U</div>
      <div>
        <div class="user-detail-name" id="m-fullname">—</div>
        <div class="user-detail-since" id="m-since">—</div>
      </div>
    </div>
    <input type="hidden" id="edit-uid">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prénom</label>
        <input class="form-input" id="f-fname" placeholder="Prénom">
      </div>
      <div class="form-group">
        <label class="form-label">Nom</label>
        <input class="form-input" id="f-name" placeholder="Nom">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" id="f-email" type="email">
    </div>
    <div class="form-group">
      <label class="form-label">Téléphone</label>
      <input class="form-input" id="f-phone" placeholder="+225...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Rôle</label>
        <select class="form-select" id="f-role">
          <option value="CLIENT">Client</option>
          <option value="ADMIN">Administrateur</option>
          <option value="LIVREUR">Livreur</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Statut</label>
        <select class="form-select" id="f-status">
          <option value="ACTIVE">Actif</option>
          <option value="INACTIVE">Inactif</option>
          <option value="BANNED">Banni</option>
        </select>
      </div>
    </div>
    <div class="flex-end">
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveUser()"><i class="fas fa-save"></i> Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import API from '../../assets/js/modules/api.js';

import { initTheme, isAuthenticated, getUser } from '../../assets/js/modules/sx-shared.js';

initTheme();
const _u = getUser();
if (!isAuthenticated() || (_u?.role !== 'admin' && _u?.role !== 'ADMIN')) {
    window.location.href = '../connexion.html';
}
const user = getUser();
if (user) {
    document.getElementById('sb-avatar').textContent = (user.first_name||user.name||'A')[0].toUpperCase();
    document.getElementById('sb-name').textContent = (user.first_name||'')+' '+(user.name||'');
}

const fmtDate = d => new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});
let allUsers = [];
let currentUser = null;
const PER_PAGE = 20;
let currentPage = 1;

async function loadUsers() {
    try {
        const res = await API.admin.users({}, 1);
        allUsers = (res.users || res.data || []).map(u => ({
            ...u,
            name: u.nom || u.name || '',
            first_name: u.prenom || u.first_name || '',
            email: u.email || '',
            role: (u.role||'client').toUpperCase(),
            status: u.is_active !== false ? 'ACTIVE' : 'INACTIVE',
            created_at: u.created_at || new Date().toISOString()
        }));
        const countEl = document.getElementById('user-count');
        if(countEl) countEl.textContent = `${allUsers.length} utilisateur(s)`;
        renderUsers();
    } catch(e) {
        console.error(e);
        const tbody = document.getElementById('users-tbody');
        if(tbody) tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="fas fa-exclamation-circle"></i>${e.message}</div></td></tr>`;
    }
}

window.filterUsers = function() { currentPage=1; renderUsers(); };

function getFiltered() {
    const s = document.getElementById('search').value.toLowerCase();
    const role = document.getElementById('filter-role').value;
    const status = document.getElementById('filter-status').value;
    return allUsers.filter(u =>
        (!s || (u.nom||u.name||'').toLowerCase().includes(s) || (u.prenom||u.first_name||'').toLowerCase().includes(s) || (u.email||'').toLowerCase().includes(s)) &&
        (!role || u.role.toUpperCase()===role) &&
        (!status || u.status===status)
    );
}

const ROLES = {ADMIN:{label:'Admin',cls:'badge-admin'},CLIENT:{label:'Client',cls:'badge-client'},LIVREUR:{label:'Livreur',cls:'badge-livreur'}};
const STATUSES = {ACTIVE:{label:'Actif',cls:'badge-active'},INACTIVE:{label:'Inactif',cls:'badge-inactive'},BANNED:{label:'Banni',cls:'badge-banned'}};

function badge(map, key) {
    const v = map[key]||{label:key,cls:'badge-client'};
    return `<span class="badge ${v.cls}">${v.label}</span>`;
}

function renderUsers() {
    const filtered = getFiltered();
    const total = filtered.length;
    const pages = Math.ceil(total/PER_PAGE);
    const start = (currentPage-1)*PER_PAGE;
    const page = filtered.slice(start,start+PER_PAGE);
    document.getElementById('filtered-count').textContent = total!==allUsers.length?`${total} résultat(s)`:'';
    const tbody = document.getElementById('users-tbody');
    if (!page.length) {
        tbody.innerHTML='<tr><td colspan="5"><div class="empty-state"><i class="fas fa-users-slash"></i>Aucun utilisateur trouvé</div></td></tr>';
    } else {
        tbody.innerHTML = page.map(u=>`
            <tr>
                <td>
                    <div class="user-cell">
                        <div class="u-avatar">${(u.first_name||u.name||'U')[0].toUpperCase()}</div>
                        <div>
                            <div class="u-name">${u.first_name||''} ${u.name||'—'}</div>
                            <div class="u-email">${u.email||'—'}</div>
                        </div>
                    </div>
                </td>
                <td>${badge(ROLES,u.role)}</td>
                <td>${badge(STATUSES,u.status||'ACTIVE')}</td>
                <td>${u.created_at?fmtDate(u.created_at):'—'}</td>
                <td>
                    <button class="btn btn-secondary btn-sm" onclick="openEdit(${u.id})">
                        <i class="fas fa-edit"></i> Modifier
                    </button>
                </td>
            </tr>
        `).join('');
    }
    const pag = document.getElementById('pagination');
    if (pages>1) {
        pag.style.display='';
        document.getElementById('pag-info').textContent=`${start+1}–${Math.min(start+PER_PAGE,total)} sur ${total}`;
        document.getElementById('pag-btns').innerHTML=`
            <button class="pag-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>
            ${Array.from({length:Math.min(pages,5)},(_,i)=>`<button class="pag-btn ${i+1===currentPage?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('')}
            <button class="pag-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>›</button>
        `;
    } else pag.style.display='none';
}

window.goPage = function(p) { currentPage=p; renderUsers(); window.scrollTo(0,0); };

window.openEdit = function(id) {
    const u = allUsers.find(x=>x.id==id);
    if (!u) return;
    currentUser = u;
    document.getElementById('edit-uid').value = id;
    document.getElementById('m-avatar').textContent = (u.first_name||u.name||'U')[0].toUpperCase();
    document.getElementById('m-fullname').textContent = (u.first_name||'')+' '+(u.name||'');
    document.getElementById('m-since').textContent = u.created_at ? 'Inscrit le '+fmtDate(u.created_at) : '';
    document.getElementById('f-fname').value = u.first_name||'';
    document.getElementById('f-name').value = u.name||'';
    document.getElementById('f-email').value = u.email||'';
    document.getElementById('f-phone').value = u.phone||'';
    document.getElementById('f-role').value = u.role||'CLIENT';
    document.getElementById('f-status').value = u.status||'ACTIVE';
    document.getElementById('edit-modal').classList.add('open');
};

window.closeModal = function() { document.getElementById('edit-modal').classList.remove('open'); currentUser=null; };

window.saveUser = async function() {
    if (!currentUser) return;
    const data = {
        first_name: document.getElementById('f-fname').value.trim(),
        name: document.getElementById('f-name').value.trim(),
        email: document.getElementById('f-email').value.trim(),
        phone: document.getElementById('f-phone').value.trim(),
        role: document.getElementById('f-role').value,
        status: document.getElementById('f-status').value,
    };
    try {
        // Update in localStorage
const users = JSON.parse(localStorage.getItem('sneakx_users')||'[]');
const idx = users.findIndex(u=>u.id==currentUser.id);
if(idx>-1){Object.assign(users[idx],data);localStorage.setItem('sneakx_users',JSON.stringify(users));}
const res = { success: true };
        if (!res.success) throw new Error(res.message);
        const idx = allUsers.findIndex(x=>x.id===currentUser.id);
        if (idx>=0) allUsers[idx] = {...allUsers[idx],...data};
        renderUsers();
        toast('Utilisateur mis à jour !','success');
        closeModal();
    } catch(e) { toast('Erreur : '+e.message,'error'); }
};

function toast(msg,type='info') {
    const el=document.createElement('div');
    el.className=`toast-msg ${type}`;
    const icon=type==='success'?'fa-check-circle':type==='error'?'fa-times-circle':'fa-info-circle';
    el.innerHTML=`<i class="fas ${icon}"></i> ${msg}`;
    document.getElementById('toast').appendChild(el);
    setTimeout(()=>el.remove(),3500);
}

window.doLogout = function() {
    if (confirm('Se déconnecter ?')) { localStorage.removeItem('access_token'); localStorage.removeItem('sneakx_session'); localStorage.removeItem('user'); localStorage.removeItem('wallet'); window.location.href='../connexion.html'; }
};

loadUsers();
</script>
