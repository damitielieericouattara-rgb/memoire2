<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produits — SneakX Admin</title>
<link rel="stylesheet" href="../../assets/css/admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--orange:#FF5C00;--orange-light:#FF7A2E;--orange-dim:rgba(255,92,0,0.12);--success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;--bg:#0D0D0D;--bg2:#141414;--bg3:#1C1C1C;--bg4:#242424;--bg5:#2C2C2C;--text:#FFF;--text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.28);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.5)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
.admin-wrap{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;z-index:100;display:flex;flex-direction:column;overflow-y:auto}
.sb-logo{padding:24px 20px;border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.sb-logo span{color:var(--orange)}
.sb-logo small{display:block;font-size:10px;font-weight:600;letter-spacing:3px;color:var(--text3);margin-top:2px}
.sb-nav{flex:1;padding:12px 0}
.sb-section{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:16px 20px 6px}
.sb-link{display:flex;align-items:center;gap:12px;padding:11px 20px;color:var(--text2);font-size:13px;font-weight:600;transition:.2s;border-left:3px solid transparent}
.sb-link:hover,.sb-link.active{color:var(--text);background:var(--orange-dim);border-left-color:var(--orange)}
.sb-link i{width:16px;text-align:center;color:var(--orange)}
.sb-bottom{padding:16px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:var(--bg3);margin-bottom:10px}
.sb-avatar{width:36px;height:36px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.sb-user-name{font-weight:700;font-size:13px}
.sb-user-role{font-size:10px;color:var(--orange);font-weight:700;text-transform:uppercase;letter-spacing:1px}
.btn-logout{width:100%;padding:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:8px;font-weight:700;font-size:12px;text-transform:uppercase;cursor:pointer;transition:.2s}
.btn-logout:hover{background:rgba(239,68,68,.2)}
.main{flex:1;margin-left:240px;padding:32px 36px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;text-transform:uppercase;letter-spacing:-1px}
.page-title span{color:var(--orange)}
.btn{padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:.2s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:hover{background:var(--orange-light)}
.btn-secondary{background:var(--bg4);border:1px solid var(--border);color:var(--text2)}
.btn-secondary:hover{color:var(--text);background:var(--bg5)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-sm{padding:5px 10px;font-size:11px}
/* Filters */
.filters{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-box{position:relative;flex:1;min-width:200px}
.search-box input{width:100%;padding:10px 14px 10px 38px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;transition:.2s}
.search-box input:focus{border-color:var(--orange)}
.search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px}
.filter-select{padding:10px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;cursor:pointer}
/* Product grid */
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.prod-card{background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:.25s}
.prod-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.prod-img{width:100%;height:180px;object-fit:cover;background:var(--bg4)}
.prod-body{padding:14px}
.prod-name{font-weight:700;font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-sku{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.prod-price{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;color:var(--orange)}
.prod-meta{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.prod-stock{font-size:12px;font-weight:700}
.prod-stock.ok{color:var(--success)}
.prod-stock.warn{color:var(--warning)}
.prod-stock.out{color:var(--danger)}
.badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.badge-active{background:rgba(16,185,129,.12);color:var(--success)}
.badge-inactive{background:rgba(239,68,68,.12);color:var(--danger)}
.prod-actions{display:flex;gap:6px;margin-top:10px}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.3s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:32px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:.3s}
.modal-overlay.open .modal{transform:none}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;text-transform:uppercase}
.modal-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}
.modal-close:hover{color:var(--text)}
.form-group{margin-bottom:16px}
.form-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2);display:block;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;outline:none;transition:.2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--orange)}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.flex-end{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
/* Delete confirm */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.3s}
.confirm-overlay.open{opacity:1;pointer-events:all}
.confirm-box{background:var(--bg3);border:1px solid rgba(239,68,68,.2);border-radius:16px;padding:28px;max-width:380px;text-align:center}
.confirm-icon{font-size:36px;color:var(--danger);margin-bottom:14px}
.confirm-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;margin-bottom:8px}
.confirm-text{font-size:13px;color:var(--text2);margin-bottom:20px}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-msg{padding:12px 18px;background:var(--bg4);border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);animation:slideIn .3s ease;border-left:3px solid var(--orange)}
.toast-msg.success{border-color:var(--success)}
.toast-msg.error{border-color:var(--danger)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.empty-state{text-align:center;padding:60px;color:var(--text3);grid-column:1/-1}
.empty-state i{font-size:40px;margin-bottom:14px;display:block}
</style>
</head>
<body>
<div class="admin-wrap">
  <aside class="sidebar">
    <div class="sb-logo">Sneak<span>X</span><small>Admin Panel</small></div>
    <nav class="sb-nav">
      <div class="sb-section">Principal</div>
      <a class="sb-link" href="dashboard.html"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a class="sb-link" href="commandes.html"><i class="fas fa-shopping-cart"></i> Commandes</a>
      <a class="sb-link active" href="produits.html"><i class="fas fa-box"></i> Produits</a>
      <div class="sb-section">Gestion</div>
      <a class="sb-link" href="utilisateurs.html"><i class="fas fa-users"></i> Utilisateurs</a>
      <a class="sb-link" href="analytics.html"><i class="fas fa-chart-bar"></i> Analytics</a>
      <a class="sb-link" href="fraude.html"><i class="fas fa-shield-alt"></i> Anti-fraude</a>
      <div class="sb-section">Site</div>
      <a class="sb-link" href="../dashboard.html"><i class="fas fa-store"></i> Voir la boutique</a>
    </nav>
    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">A</div>
        <div>
          <div class="sb-user-name" id="sb-name">Admin</div>
          <div class="sb-user-role">Administrateur</div>
        </div>
      </div>
      <button class="btn-logout" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Gestion des <span>Produits</span></div>
        <div style="font-size:13px;color:var(--text2);margin-top:2px" id="prod-count">Chargement...</div>
      </div>
      <button class="btn btn-primary" onclick="openCreateModal()"><i class="fas fa-plus"></i> Nouveau produit</button>
    </div>

    <div class="filters">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="search" placeholder="Rechercher par nom, SKU..." oninput="filterProducts()">
      </div>
      <select class="filter-select" id="filter-status" onchange="filterProducts()">
        <option value="">Tous les statuts</option>
        <option value="ACTIVE">Actif</option>
        <option value="INACTIVE">Inactif</option>
      </select>
      <select class="filter-select" id="filter-stock" onchange="filterProducts()">
        <option value="">Tout le stock</option>
        <option value="low">Stock faible (≤5)</option>
        <option value="out">Rupture (0)</option>
      </select>
    </div>

    <div class="products-grid" id="products-grid">
      <div class="empty-state"><i class="fas fa-spinner fa-spin"></i>Chargement des produits...</div>
    </div>
  </main>
</div>

<!-- Create/Edit Modal -->
<div class="modal-overlay" id="prod-modal" onclick="if(event.target===this)closeProdModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nouveau produit</div>
      <button class="modal-close" onclick="closeProdModal()"><i class="fas fa-times"></i></button>
    </div>
    <input type="hidden" id="edit-id">
    <div class="form-group">
      <label class="form-label">Nom du produit *</label>
      <input class="form-input" id="f-name" placeholder="Ex: Nike Air Max 90">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">SKU *</label>
        <input class="form-input" id="f-sku" placeholder="Ex: NK-AM90-001">
      </div>
      <div class="form-group">
        <label class="form-label">Statut</label>
        <select class="form-select" id="f-status">
          <option value="ACTIVE">Actif</option>
          <option value="INACTIVE">Inactif</option>
        </select>
      </div>
    </div>
    <div class="form-row-3">
      <div class="form-group">
        <label class="form-label">Prix (XOF) *</label>
        <input class="form-input" id="f-price" type="number" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Prix promo</label>
        <input class="form-input" id="f-promo" type="number" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Stock *</label>
        <input class="form-input" id="f-stock" type="number" placeholder="0">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Image URL</label>
      <input class="form-input" id="f-image" placeholder="https://...">
    </div>
    <div class="form-group">
      <label class="form-label">Description courte</label>
      <input class="form-input" id="f-sdesc" placeholder="Résumé en quelques mots">
    </div>
    <div class="form-group">
      <label class="form-label">Description longue</label>
      <textarea class="form-textarea" id="f-ldesc" placeholder="Description complète du produit..."></textarea>
    </div>
    <div class="flex-end">
      <button class="btn btn-secondary" onclick="closeProdModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveProd()"><i class="fas fa-save"></i> Enregistrer</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="confirm-overlay" id="confirm-modal">
  <div class="confirm-box">
    <div class="confirm-icon"><i class="fas fa-trash-alt"></i></div>
    <div class="confirm-title">Supprimer ce produit ?</div>
    <p class="confirm-text" id="confirm-text">Cette action est irréversible.</p>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-secondary" onclick="closeConfirm()">Annuler</button>
      <button class="btn btn-danger" id="confirm-btn">Supprimer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import API from '../../assets/js/modules/api.js';

import { initTheme, isAuthenticated, getUser } from '../../assets/js/modules/sx-shared.js';

initTheme();
const _u = getUser();
if (!isAuthenticated() || (_u?.role !== 'admin' && _u?.role !== 'ADMIN')) {
    window.location.href = '../connexion.html';
}
const user = getUser();
if (user) {
    document.getElementById('sb-avatar').textContent = (user.first_name||user.name||'A')[0].toUpperCase();
    document.getElementById('sb-name').textContent = (user.first_name||'')+' '+(user.name||'');
}

const fmt = v => new Intl.NumberFormat('fr-FR').format(Math.round(v||0))+' XOF';

let allProducts = [];

async function loadProducts() {
    try {
        const db = JSON.parse(localStorage.getItem('sneakx_data')||'{}');
        const raw = db.products || [];
        allProducts = raw.map(p => ({
            ...p,
            name: p.nom || p.name || 'Produit',
            sku: p.reference || p.sku || ('SKU-'+p.id),
            price: p.prix || p.price || 0,
            promo_price: p.prix_promo || p.promo_price || null,
            stock: p.stock || 0,
            status: p.is_active !== false ? 'ACTIVE' : 'INACTIVE',
            image_url: (p.images||[])[0] || p.image_url || '',
            short_description: p.description || '',
        }));
        const countEl = document.getElementById('prod-count');
        if(countEl) countEl.textContent = `${allProducts.length} produit(s)`;
        renderProducts();
    } catch(e) {
        console.error(e);
        const grid = document.getElementById('products-grid');
        if(grid) grid.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i>${e.message}</div>`;
    }
}

window.filterProducts = function() { renderProducts(); };

function getFiltered() {
    const search = document.getElementById('search').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    const stock = document.getElementById('filter-stock').value;
    return allProducts.filter(p => {
        const ms = !search || (p.name||p.nom||'').toLowerCase().includes(search) || (p.sku||'').toLowerCase().includes(search) || (p.marque||p.brand||'').toLowerCase().includes(search);
        const mst = !status || p.status === status;
        const msk = !stock || (stock==='low' && p.stock<=5 && p.stock>0) || (stock==='out' && p.stock==0);
        return ms && mst && msk;
    });
}

function stockClass(s) { return s==0?'out':s<=5?'warn':'ok'; }
function stockLabel(s) { return s==0?'Rupture':s<=5?`Stock faible (${s})`:`${s} en stock`; }

function renderProducts() {
    const filtered = getFiltered();
    const grid = document.getElementById('products-grid');
    if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i>Aucun produit trouvé</div>';
        return;
    }
    grid.innerHTML = filtered.map(p => {
        const img = p.image_url || p.images?.[0]?.url || '';
        const price = p.promo_price || p.price || 0;
        return `
        <div class="prod-card">
            <img class="prod-img" src="${img}" alt="${p.name}" onerror="this.src='';this.style.background='var(--bg5)'">
            <div class="prod-body">
                <div class="prod-name" title="${p.name}">${p.name}</div>
                <div class="prod-sku">${p.sku||'—'}</div>
                <div style="display:flex;align-items:center;justify-content:space-between">
                    <div class="prod-price">${fmt(price)}</div>
                    <span class="badge badge-${(p.status||'INACTIVE').toLowerCase()}">${p.status==='ACTIVE'?'Actif':'Inactif'}</span>
                </div>
                <div class="prod-meta">
                    <div class="prod-stock ${stockClass(p.stock)}"><i class="fas fa-box" style="margin-right:4px"></i>${stockLabel(p.stock)}</div>
                </div>
                <div class="prod-actions">
                    <button class="btn btn-secondary btn-sm" style="flex:1" onclick="openEditModal(${p.id})"><i class="fas fa-edit"></i> Modifier</button>
                    <button class="btn btn-danger btn-sm" onclick="confirmDelete(${p.id},'${p.name.replace(/'/g,'')}}')"><i class="fas fa-trash"></i></button>
                </div>
            </div>
        </div>`;
    }).join('');
}

window.openCreateModal = function() {
    document.getElementById('modal-title').textContent = 'Nouveau produit';
    document.getElementById('edit-id').value = '';
    ['name','sku','price','promo','stock','image','sdesc','ldesc'].forEach(f=>document.getElementById('f-'+f).value='');
    document.getElementById('f-status').value = 'ACTIVE';
    document.getElementById('prod-modal').classList.add('open');
};

window.openEditModal = function(id) {
    const p = allProducts.find(x=>x.id==id);
    if (!p) return;
    document.getElementById('modal-title').textContent = 'Modifier le produit';
    document.getElementById('edit-id').value = id;
    document.getElementById('f-name').value = p.name||'';
    document.getElementById('f-sku').value = p.sku||'';
    document.getElementById('f-price').value = p.price||'';
    document.getElementById('f-promo').value = p.promo_price||'';
    document.getElementById('f-stock').value = p.stock||'';
    document.getElementById('f-status').value = p.status||'ACTIVE';
    document.getElementById('f-image').value = p.image_url||p.images?.[0]?.url||'';
    document.getElementById('f-sdesc').value = p.short_description||'';
    document.getElementById('f-ldesc').value = p.long_description||'';
    document.getElementById('prod-modal').classList.add('open');
};

window.closeProdModal = function() { document.getElementById('prod-modal').classList.remove('open'); };

window.saveProd = async function() {
    const id = document.getElementById('edit-id').value;
    const name = document.getElementById('f-name').value.trim();
    const sku = document.getElementById('f-sku').value.trim();
    const price = parseFloat(document.getElementById('f-price').value);
    const stock = parseInt(document.getElementById('f-stock').value);
    if (!name || !sku || isNaN(price) || isNaN(stock)) { toast('Veuillez remplir tous les champs obligatoires','error'); return; }
    const data = {
        name, sku, price, stock,
        promo_price: parseFloat(document.getElementById('f-promo').value)||null,
        status: document.getElementById('f-status').value,
        image_url: document.getElementById('f-image').value.trim()||null,
        short_description: document.getElementById('f-sdesc').value.trim()||null,
        long_description: document.getElementById('f-ldesc').value.trim()||null,
    };
    try {
        const db = JSON.parse(localStorage.getItem('sneakx_data')||'{}');
        db.products = db.products || [];
        if (id) {
            const idx = db.products.findIndex(p=>p.id==id);
            if(idx>-1) {
                db.products[idx] = {...db.products[idx], nom:data.name, prix:data.price, prix_promo:data.promo_price||null, stock:data.stock, reference:data.sku, images:data.image_url?[data.image_url]:db.products[idx].images, description:data.short_description||'', is_active:data.status==='ACTIVE'};
            }
        } else {
            const newP = {id:Date.now(), nom:data.name, marque:'SneakX', prix:data.price, prix_promo:data.promo_price||null, stock:data.stock, reference:data.sku, images:data.image_url?[data.image_url]:[], description:data.short_description||'', is_active:true, is_featured:false, note_moyenne:4.5, nb_avis:0, slug:data.name.toLowerCase().replace(/[^a-z0-9]+/g,'-'), tailles:[40,41,42,43,44,45], couleurs:['Noir','Blanc'], created_at:new Date().toISOString().split('T')[0]};
            db.products.push(newP);
        }
        localStorage.setItem('sneakx_data', JSON.stringify(db));
        toast(id ? 'Produit mis à jour !' : 'Produit créé !', 'success');
        closeProdModal();
        loadProducts();
    } catch(e) { toast('Erreur : '+e.message,'error'); }
};

let deleteId = null;
window.confirmDelete = function(id, name) {
    deleteId = id;
    document.getElementById('confirm-text').textContent = `Supprimer "${name}" ? Cette action est irréversible.`;
    document.getElementById('confirm-btn').onclick = async () => {
        try {
            const db = JSON.parse(localStorage.getItem('sneakx_data')||'{}');
            db.products = (db.products||[]).filter(p=>p.id!=deleteId);
            localStorage.setItem('sneakx_data', JSON.stringify(db));
            const res = { success: true };
            toast('Produit supprimé','success');
            closeConfirm();
            loadProducts();
        } catch(e) { toast('Erreur : '+e.message,'error'); }
    };
    document.getElementById('confirm-modal').classList.add('open');
};
window.closeConfirm = function() { document.getElementById('confirm-modal').classList.remove('open'); deleteId=null; };

function toast(msg, type='info') {
    const el = document.createElement('div');
    el.className = `toast-msg ${type}`;
    const icon = type==='success'?'fa-check-circle':type==='error'?'fa-times-circle':'fa-info-circle';
    el.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
    document.getElementById('toast').appendChild(el);
    setTimeout(()=>el.remove(),3500);
}

window.doLogout = function() {
    if (confirm('Se déconnecter ?')) { localStorage.removeItem('access_token'); localStorage.removeItem('sneakx_session'); localStorage.removeItem('user'); localStorage.removeItem('wallet'); window.location.href='../connexion.html'; }
};

loadProducts();
</script>
</body>
