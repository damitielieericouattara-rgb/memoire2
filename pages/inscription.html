<!-- Fichier: /frontend/pages/inscription.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — SneakX</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/accessibility.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-page { min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }
        .auth-visual { background:#0D0D0D; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
        .auth-visual::before { content:''; position:absolute; top:-100px; right:-100px; width:500px; height:500px; background:radial-gradient(circle,rgba(255,92,0,0.25) 0%,transparent 65%); }
        .auth-visual::after { content:''; position:absolute; bottom:-80px; left:-80px; width:350px; height:350px; background:radial-gradient(circle,rgba(255,92,0,0.12) 0%,transparent 65%); }
        .auth-visual-content { position:relative; z-index:1; text-align:center; padding:40px; color:#fff; }
        .auth-shoe { width:280px; height:240px; object-fit:contain; animation:float 4.5s ease-in-out infinite; display:block; filter:drop-shadow(0 25px 50px rgba(255,92,0,0.5)); }
        @keyframes float { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-16px) rotate(-5deg)} }
        .auth-visual-title { font-family:'Barlow Condensed',sans-serif; font-size:52px; font-weight:900; text-transform:uppercase; letter-spacing:-2px; line-height:1; margin-top:20px; }
        .auth-visual-title span { color:var(--orange); }
        .auth-perks { display:flex; flex-direction:column; gap:12px; margin-top:30px; text-align:left; }
        .auth-perk { display:flex; align-items:center; gap:12px; font-size:13px; color:rgba(255,255,255,0.7); }
        .auth-perk i { color:var(--orange); font-size:16px; width:20px; }
        .auth-form-side { background:var(--bg); display:flex; align-items:center; justify-content:center; padding:40px; overflow-y:auto; }
        .auth-form-wrap { width:100%; max-width:440px; }
        .auth-logo-sm { display:flex; align-items:center; gap:8px; margin-bottom:32px; cursor:pointer; }
        .auth-logo-sm .lname { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(--text); }
        .auth-logo-sm .orange { color:var(--orange); }
        .auth-head { margin-bottom:28px; }
        .auth-head h1 { font-family:'Barlow Condensed',sans-serif; font-size:38px; font-weight:900; text-transform:uppercase; letter-spacing:-1px; color:var(--text); }
        .auth-head p { color:var(--text2); font-size:14px; margin-top:6px; }
        .name-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .pwd-strength { margin-top:6px; display:flex; gap:4px; }
        .pwd-bar { flex:1; height:3px; background:var(--border); border-radius:2px; transition:background .3s; }
        .pwd-bar.weak { background:#ef4444; }
        .pwd-bar.medium { background:#f59e0b; }
        .pwd-bar.strong { background:#10b981; }
        .login-link { text-align:center; margin-top:20px; font-size:13px; color:var(--text2); }
        .login-link a { color:var(--orange); font-weight:700; }
        .theme-top { position:fixed; top:20px; right:20px; z-index:99; }
        @media (max-width:768px) { .auth-page{grid-template-columns:1fr} .auth-visual{display:none} .auth-form-side{padding:30px 20px;padding-top:60px;min-height:100vh;align-items:flex-start;} .name-row{grid-template-columns:1fr;} }
    </style>
</head>
<body>
    <div class="theme-top">
        <button class="sx-theme-btn" id="sx-theme-btn" onclick="SX.toggleTheme()" title="Changer le thème"><i class="fas fa-sun"></i></button>
    </div>
    <div class="auth-page">
        <div class="auth-visual">
            <div class="auth-visual-content">
                <img class="auth-shoe" src="https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=600&q=85" alt="SneakX Shoes">
                <div class="auth-visual-title">Rejoignez<br>Sneak<span>X</span></div>
                <div class="auth-perks">
                    <div class="auth-perk"><i class="fas fa-tag"></i> Accès aux meilleures offres</div>
                    <div class="auth-perk"><i class="fas fa-truck"></i> Suivi de commande en temps réel</div>
                    <div class="auth-perk"><i class="fas fa-wallet"></i> Wallet intégré et sécurisé</div>
                    <div class="auth-perk"><i class="fas fa-brain"></i> Recommandations personnalisées IA</div>
                    <div class="auth-perk"><i class="fas fa-heart"></i> Wishlist & favoris illimités</div>
                </div>
            </div>
        </div>
        <div class="auth-form-side">
            <div class="auth-form-wrap">
                <div class="auth-logo-sm" onclick="window.location.href='index.html'">
                    <i class="fas fa-shopping-bag" style="color:var(--orange);font-size:20px"></i>
                    <span class="lname">Sneak<span class="orange">X</span></span>
                </div>
                <div class="auth-head">
                    <h1>Créer un compte</h1>
                    <p>Rejoignez des milliers de sneaker lovers</p>
                </div>
                <form id="registerForm">
                    <div class="name-row">
                        <div class="sx-form-group">
                            <label class="sx-label">Nom</label>
                            <div class="sx-input-wrap"><i class="fas fa-user sx-input-icon"></i><input type="text" id="name" class="sx-input has-icon" placeholder="Dupont" required autocomplete="family-name"></div>
                        </div>
                        <div class="sx-form-group">
                            <label class="sx-label">Prénom</label>
                            <div class="sx-input-wrap"><i class="fas fa-user sx-input-icon"></i><input type="text" id="first_name" class="sx-input has-icon" placeholder="Jean" required autocomplete="given-name"></div>
                        </div>
                    </div>
                    <div class="sx-form-group">
                        <label class="sx-label">Adresse email</label>
                        <div class="sx-input-wrap"><i class="fas fa-envelope sx-input-icon"></i><input type="email" id="email" class="sx-input has-icon" placeholder="votre@email.com" required autocomplete="email"></div>
                    </div>
                    <div class="sx-form-group">
                        <label class="sx-label">Téléphone <span style="color:var(--text3);font-weight:400">(optionnel)</span></label>
                        <div class="sx-input-wrap"><i class="fas fa-phone sx-input-icon"></i><input type="tel" id="phone" class="sx-input has-icon" placeholder="+225 XX XX XX XX XX"></div>
                    </div>
                    <div class="sx-form-group">
                        <label class="sx-label">Mot de passe</label>
                        <div class="sx-input-wrap"><i class="fas fa-lock sx-input-icon"></i><input type="password" id="password" class="sx-input has-icon" placeholder="Minimum 8 caractères" required minlength="8" autocomplete="new-password" style="padding-right:44px" oninput="checkStrength(this.value)"><button type="button" class="sx-pwd-toggle" onclick="togglePwd('password','eye1')" aria-label="Afficher/masquer"><i class="fas fa-eye" id="eye1"></i></button></div>
                        <div class="pwd-strength"><div class="pwd-bar" id="bar1"></div><div class="pwd-bar" id="bar2"></div><div class="pwd-bar" id="bar3"></div><div class="pwd-bar" id="bar4"></div></div>
                        <p class="sx-help">Minimum 8 caractères</p>
                    </div>
                    <div class="sx-form-group">
                        <label class="sx-label">Confirmer le mot de passe</label>
                        <div class="sx-input-wrap"><i class="fas fa-lock sx-input-icon"></i><input type="password" id="password_confirm" class="sx-input has-icon" placeholder="••••••••" required autocomplete="new-password" style="padding-right:44px"><button type="button" class="sx-pwd-toggle" onclick="togglePwd('password_confirm','eye2')" aria-label="Afficher/masquer"><i class="fas fa-eye" id="eye2"></i></button></div>
                        <div class="sx-error" id="pwdError"></div>
                    </div>
                    <div class="sx-form-group">
                        <label class="sx-checkbox-wrap">
                            <input type="checkbox" id="rgpd_consent" required>
                            <span class="sx-checkbox-label">J'accepte les <a href="#">conditions d'utilisation</a> et la politique de confidentialité</span>
                        </label>
                    </div>
                    <div id="alertBox"></div>
                    <button type="submit" class="sx-btn sx-btn-orange sx-btn-full" id="submitBtn">
                        <span id="submitText"><i class="fas fa-user-plus"></i> Créer mon compte</span>
                        <span id="submitSpin" style="display:none"><i class="fas fa-spinner fa-spin"></i> Inscription...</span>
                    </button>
                </form>
                <p class="login-link">Déjà un compte ? <a href="connexion.html">Se connecter</a></p>
            </div>
        </div>
    </div>
    <div id="sx-toast-container"></div>
    <script type="module">
        import { initTheme, toggleTheme, updateThemeIcon } from '../assets/js/modules/sx-shared.js';
        const theme = initTheme(); updateThemeIcon(theme);
        window.SX = { toggleTheme: () => { toggleTheme(); updateThemeIcon(document.documentElement.getAttribute('data-theme')); } };
        window.togglePwd = (fid, iid) => { const f=document.getElementById(fid),i=document.getElementById(iid); f.type=f.type==='password'?'text':'password'; i.className=f.type==='text'?'fas fa-eye-slash':'fas fa-eye'; };
        window.checkStrength = (pwd) => {
            const bars = [document.getElementById('bar1'),document.getElementById('bar2'),document.getElementById('bar3'),document.getElementById('bar4')];
            bars.forEach(b=>b.className='pwd-bar');
            if(!pwd){return;}
            let score=0;
            if(pwd.length>=8)score++;
            if(/[A-Z]/.test(pwd))score++;
            if(/[0-9]/.test(pwd))score++;
            if(/[^A-Za-z0-9]/.test(pwd))score++;
            const cls=score<=1?'weak':score<=2?'medium':'strong';
            for(let i=0;i<score;i++)bars[i].classList.add(cls);
        };
        document.getElementById('password_confirm').addEventListener('input',()=>{
            const p=document.getElementById('password').value, c=document.getElementById('password_confirm').value;
            document.getElementById('pwdError').textContent=c&&p!==c?'Les mots de passe ne correspondent pas':'';
        });
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pwd=document.getElementById('password').value, conf=document.getElementById('password_confirm').value;
            if(pwd!==conf){showAlert('error','Les mots de passe ne correspondent pas.');return;}
            if(!document.getElementById('rgpd_consent').checked){showAlert('error',"Veuillez accepter les conditions d'utilisation.");return;}
            setLoading(true);
            try {
                const API = (await import('../assets/js/modules/api.js')).default;
                const resp = await API.auth.register({
                    nom:        document.getElementById('name').value.trim(),
                    prenom:     document.getElementById('first_name').value.trim(),
                    email:      document.getElementById('email').value.trim(),
                    telephone:  document.getElementById('phone').value.trim() || null,
                    password:   pwd
                });
                if(resp.success){
                    showAlert('success','Compte créé avec succès ! Redirection...');
                    setTimeout(()=>window.location.href='dashboard.html',1500);
                } else {
                    showAlert('error', resp.error || resp.errors?.join(', ') || "Erreur lors de l'inscription");
                    setLoading(false);
                }
            } catch(err) {
                console.error(err);
                showAlert('error', 'Une erreur est survenue. Veuillez réessayer.');
                setLoading(false);
            }
        });
        function setLoading(on){document.getElementById('submitBtn').disabled=on;document.getElementById('submitText').style.display=on?'none':'flex';document.getElementById('submitSpin').style.display=on?'inline':'none';}
        function showAlert(type,msg){const cls=type==='success'?'sx-alert-success':'sx-alert-error',icon=type==='success'?'fa-check-circle':'fa-exclamation-circle';document.getElementById('alertBox').innerHTML=`<div class="sx-alert ${cls}"><i class="fas ${icon}"></i>${msg}</div>`;}
    </script>
</body>
</html>
