<!-- Fichier: /frontend/pages/offline.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors ligne - E-Commerce Intelligent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .offline-container { max-width: 480px; }
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            opacity: 0.9;
        }
        h1 { font-size: 2rem; margin-bottom: 1rem; }
        p { font-size: 1.1rem; opacity: 0.85; margin-bottom: 2rem; line-height: 1.6; }
        .btn {
            background: white;
            color: #764ba2;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            margin: 0.5rem;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-outline {
            background: transparent;
            color: white;
            border: 2px solid white;
        }
        .cached-pages {
            margin-top: 2rem;
            background: rgba(255,255,255,0.15);
            border-radius: 0.75rem;
            padding: 1.5rem;
        }
        .cached-pages h3 { margin-bottom: 1rem; font-size: 1rem; }
        .cached-link {
            display: block;
            color: white;
            padding: 0.5rem;
            border-radius: 0.375rem;
            transition: background 0.2s;
            font-size: 0.95rem;
        }
        .cached-link:hover { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Vous êtes hors ligne</h1>
        <p>
            Impossible de se connecter au serveur.<br>
            Vérifiez votre connexion internet et réessayez.
        </p>

        <button class="btn" onclick="window.location.reload()">
            🔄 Réessayer
        </button>
        <button class="btn btn-outline" onclick="history.back()">
            ← Retour
        </button>

        <div class="cached-pages">
            <h3>📱 Pages disponibles hors ligne</h3>
            <a href="dashboard.html" class="cached-link">🏠 Tableau de bord</a>
            <a href="catalogue.html" class="cached-link">🛍 Catalogue</a>
            <a href="commandes.html" class="cached-link">📦 Mes commandes</a>
        </div>

        <p style="margin-top:1.5rem; font-size:0.85rem; opacity:0.7;">
            Certaines fonctionnalités comme le paiement<br>nécessitent une connexion internet.
        </p>
    </div>

    <script>
        // Vérifie la reconnexion
        window.addEventListener('online', () => {
            document.querySelector('.offline-icon').textContent = '✅';
            document.querySelector('h1').textContent = 'Connexion rétablie !';
            setTimeout(() => history.back(), 1500);
        });
    </script>
</body>
</html>
