<!-- Fichier: /frontend/pages/wishlist.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Wishlist — SneakX</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/accessibility.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
        /* SneakX override */
        body { font-family: 'Barlow', sans-serif; }
        .container { max-width: 1100px; margin: 0 auto; padding: 90px 60px 60px; }
        h1, h2 { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; color: var(--text); }
        h1 { font-size: 40px; }
        h2 { font-size: 28px; }
        h1 span, h2 span { color: var(--orange); }
        .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 24px; }
        .btn-primary { background: var(--orange); color: #fff; border: none; border-radius: 8px; font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; padding: 10px 20px; cursor: pointer; transition: all .2s; }
        .btn-primary:hover { background: var(--orange-light); }
        .btn-secondary { background: var(--bg4); color: var(--text2); border: 1px solid var(--border2); border-radius: 8px; font-family: 'Barlow', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; padding: 10px 20px; cursor: pointer; transition: all .2s; }
        .btn-secondary:hover { border-color: var(--text2); color: var(--text); }
        .text-primary { color: var(--orange) !important; }
        .text-secondary { color: var(--text2) !important; }
        .form-input { background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px; outline: none; }
        .form-input:focus { border-color: var(--orange); }
        .card { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; }
        @media(max-width:768px){.container{padding:80px 16px 40px}.products-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>
    <div id="sx-header-placeholder"></div>
    

    <main class="container" style="padding-top:90px;padding-bottom:2rem;">
        <div class="flex-between mb-xl">
            <div>
                <h1><i class="fas fa-heart text-primary"></i> Ma Wishlist</h1>
                <p class="text-secondary" id="wishCount">Chargement...</p>
            </div>
            <button class="sx-btn sx-btn-orange" onclick="window.location.href='catalogue.html'">
                <i class="fas fa-plus"></i> Ajouter des produits
            </button>
        </div>

        <!-- Wishlists tabs -->
        <div id="wishlistTabs" class="mb-lg" style="display:flex;gap:.5rem;flex-wrap:wrap;"></div>

        <!-- Products grid -->
        <div id="wishlistProducts" class="grid grid-cols-4">
            <div style="grid-column:span 4;text-align:center;padding:3rem;">
                <div class="sx-spinner" style="margin:auto;"></div>
            </div>
        </div>

        <!-- Create new list button -->
        <div class="text-center mt-xl">
            <button class="btn btn-secondary" onclick="createList()">
                <i class="fas fa-plus"></i> Créer une nouvelle liste
            </button>
        </div>
    </main>

    <!-- Modal new list -->
    <div id="newListModal" class="modal-overlay" style="display:none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title"><i class="fas fa-heart"></i> Nouvelle liste</h3>
                <button class="modal-close" onclick="document.getElementById('newListModal').style.display='none'">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label required">Nom de la liste</label>
                    <input type="text" id="newListName" class="form-input" placeholder="Ex: Cadeaux de Noël, Idées tech...">
                </div>
                <div class="form-group">
                    <label class="form-checkbox">
                        <input type="checkbox" id="newListPublic">
                        <span><i class="fas fa-globe"></i> Rendre publique (partageable)</span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="document.getElementById('newListModal').style.display='none'">Annuler</button>
                <button class="sx-btn sx-btn-orange" onclick="saveNewList()"><i class="fas fa-save"></i> Créer</button>
            </div>
        </div>
    </div>

    <style>
        .wish-tab { padding:.5rem 1.25rem; border:2px solid var(--border-color); border-radius:9999px; cursor:pointer; font-weight:500; transition:all .2s; background:white; }
        .wish-tab.active { border-color:var(--primary-color); background:var(--primary-color); color:white; }
        .wish-tab:hover:not(.active) { border-color:var(--primary-color); color:var(--primary-color); }

        .wish-card { background:white; border:1px solid var(--border-color); border-radius:.75rem; overflow:hidden; transition:box-shadow .3s; position:relative; }
        .wish-card:hover { box-shadow:var(--shadow-md); }
        .wish-img { width:100%; height:200px; object-fit:cover; background:var(--bg-secondary); }
        .wish-body { padding:1rem; }
        .wish-name { font-weight:600; margin-bottom:.5rem; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .wish-price { color:var(--primary-color); font-size:1.1rem; font-weight:700; margin-bottom:.75rem; }
        .wish-price .old { color:var(--text-secondary); text-decoration:line-through; font-size:.9rem; font-weight:400; margin-left:.5rem; }
        .wish-remove { position:absolute; top:.5rem; right:.5rem; background:white; border:none; width:32px; height:32px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-sm); color:var(--danger-color); font-size:.85rem; }
        .wish-remove:hover { background:var(--danger-color); color:white; }
        .wish-note { font-size:.8rem; color:var(--text-secondary); border-top:1px solid var(--border-color); padding-top:.75rem; margin-top:.75rem; font-style:italic; }

        .empty-state { text-align:center; padding:5rem 2rem; color:var(--text-secondary); grid-column:span 4; }
        .empty-state i { font-size:4rem; display:block; margin-bottom:1.5rem; opacity:.3; color:var(--danger-color); }

        .stock-badge { display:inline-block; padding:.15rem .5rem; border-radius:9999px; font-size:.75rem; font-weight:600; }
        .stock-ok { background:#d1fae5; color:#065f46; }
        .stock-low { background:#fef3c7; color:#92400e; }
        .stock-out { background:#fee2e2; color:#991b1b; }
    </style>

    <script type="module">
        import { init, showToast } from '../assets/js/modules/sx-shared.js';
        init();
        import Auth from '../assets/js/modules/auth.js';
        import API from '../assets/js/modules/api.js';
        import Cart from '../assets/js/modules/cart.js';
        import Accessibility from '../assets/js/modules/accessibility.js';

        Auth.requireAuth();

        let wishlists = [];
        let activeListId = null;

        window.addEventListener('DOMContentLoaded', async () => {
            Accessibility.init();
            await Cart.updateBadge();
            await loadWishlists();
        });

        async function loadWishlists() {
            try {
                const res = await API.get('/api/wishlist');
                wishlists = res.data || [];

                if (wishlists.length === 0) {
                    // Create default wishlist
                    await API.post('/api/wishlist', { name: 'Ma liste', is_public: false });
                    return loadWishlists();
                }

                renderTabs();
                activeListId = wishlists[0].id;
                await loadProducts(activeListId);

            } catch(err) {
                document.getElementById('wishlistProducts').innerHTML =
                    `<div style="grid-column:span 4;" class="alert alert-error">${err.message || 'Erreur de chargement'}</div>`;
            }
        }

        function renderTabs() {
            const tabs = document.getElementById('wishlistTabs');
            tabs.innerHTML = wishlists.map(l => `
                <button class="wish-tab ${l.id === activeListId ? 'active' : ''}"
                        onclick="switchList(${l.id})">
                    <i class="fas fa-heart"></i> ${escHtml(l.name)}
                    ${l.is_public ? '<i class="fas fa-globe" title="Publique" style="margin-left:.3rem;font-size:.75rem;"></i>' : ''}
                </button>`).join('');
        }

        async function loadProducts(listId) {
            const container = document.getElementById('wishlistProducts');
            container.innerHTML = '<div style="grid-column:span 4;text-align:center;padding:3rem;"><div class="sx-spinner" style="margin:auto;"></div></div>';

            try {
                const res = await API.get(`/api/wishlist/${listId}/produits`);
                const items = res.data || [];
                document.getElementById('wishCount').textContent = `${items.length} produit${items.length !== 1 ? 's' : ''}`;

                if (items.length === 0) {
                    container.innerHTML = `<div class="empty-state">
                        <i class="fas fa-heart-broken"></i>
                        <h3>Liste vide</h3>
                        <p class="mt-md">Ajoutez des produits depuis le catalogue pour les retrouver facilement.</p>
                        <button class="btn btn-primary mt-lg" onclick="window.location.href='catalogue.html'">
                            <i class="fas fa-shopping-bag"></i> Parcourir le catalogue
                        </button>
                    </div>`;
                    return;
                }

                container.innerHTML = items.map(item => renderCard(item, listId)).join('');

            } catch(err) {
                container.innerHTML = `<div style="grid-column:span 4;" class="alert alert-error">${err.message || 'Erreur'}</div>`;
            }
        }

        function renderCard(item, listId) {
            const p = item.product || item;
            const hasPromo = p.promo_price && p.promo_price < p.price;
            const price = hasPromo ? p.promo_price : p.price;
            const fmt = n => new Intl.NumberFormat('fr-FR').format(n);

            let stockBadge = '';
            if (p.stock <= 0) stockBadge = '<span class="stock-badge stock-out">Rupture</span>';
            else if (p.stock <= 5) stockBadge = `<span class="stock-badge stock-low">Derniers en stock</span>`;
            else stockBadge = '<span class="stock-badge stock-ok">En stock</span>';

            return `<div class="wish-card">
                <button class="wish-remove" onclick="removeFromWish(${listId},${p.id})" title="Retirer">
                    <i class="fas fa-times"></i>
                </button>
                <img src="${p.image_url || 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&q=75'}"
                     alt="${escHtml(p.name)}" class="wish-img"
                     onclick="window.location.href='produit.html?id=${p.id}'"
                     style="cursor:pointer;"
                     onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&q=75'">
                <div class="wish-body">
                    <div class="wish-name" onclick="window.location.href='produit.html?id=${p.id}'" style="cursor:pointer;">
                        ${escHtml(p.name)}
                    </div>
                    <div class="wish-price">
                        ${fmt(price)} XOF
                        ${hasPromo ? `<span class="old">${fmt(p.price)}</span>` : ''}
                    </div>
                    ${stockBadge}
                    ${p.average_rating > 0 ? `<div style="margin:.5rem 0;font-size:.85rem;color:#f59e0b;">
                        ${'★'.repeat(Math.round(p.average_rating))}${'☆'.repeat(5-Math.round(p.average_rating))}
                        <span class="text-secondary">(${p.reviews_count})</span>
                    </div>` : ''}
                    <button class="btn btn-primary btn-sm btn-block mt-sm"
                            onclick="addToCart(${p.id})"
                            ${p.stock <= 0 ? 'disabled' : ''}>
                        <i class="fas fa-shopping-cart"></i>
                        ${p.stock > 0 ? 'Ajouter au panier' : 'Rupture de stock'}
                    </button>
                    ${item.personal_note ? `<div class="wish-note"><i class="fas fa-sticky-note"></i> ${escHtml(item.personal_note)}</div>` : ''}
                </div>
            </div>`;
        }

        window.switchList = async function(id) {
            activeListId = id;
            document.querySelectorAll('.wish-tab').forEach(t => t.classList.remove('active'));
            event.target.closest('.wish-tab').classList.add('active');
            await loadProducts(id);
        };

        window.removeFromWish = async function(listId, productId) {
            try {
                await API.delete(`/api/wishlist/${listId}/produits/${productId}`);
                toast('Produit retiré de la liste', 'success');
                await loadProducts(listId);
            } catch(err) { toast(err.message || 'Erreur', 'error'); }
        };

        window.addToCart = async function(productId) {
            try {
                await Cart.add(productId, 1);
                await Cart.updateBadge();
                toast('Ajouté au panier !', 'success');
            } catch(err) { toast(err.message || 'Erreur', 'error'); }
        };

        window.createList = function() {
            document.getElementById('newListName').value = '';
            document.getElementById('newListPublic').checked = false;
            document.getElementById('newListModal').style.display = 'flex';
        };

        window.saveNewList = async function() {
            const name = document.getElementById('newListName').value.trim();
            if (!name) { toast('Entrez un nom pour la liste', 'error'); return; }
            try {
                await API.post('/api/wishlist', {
                    name,
                    is_public: document.getElementById('newListPublic').checked
                });
                document.getElementById('newListModal').style.display = 'none';
                toast('Liste créée !', 'success');
                await loadWishlists();
            } catch(err) { toast(err.message || 'Erreur', 'error'); }
        };

        function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function toast(msg, type) {
            const t = document.createElement('div');
            t.className = `alert alert-${type === 'success' ? 'success' : 'error'}`;
            t.style.cssText = 'position:fixed;bottom:1rem;right:1rem;z-index:9999;padding:1rem 1.5rem;border-radius:.5rem;';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }
    </script>
</body>
</html>
