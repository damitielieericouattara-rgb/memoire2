<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Admin — SneakX</title>
    <link rel="stylesheet" href="../../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
        .login-box {
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 24px; padding: 48px 44px; max-width: 420px; width: 90%;
            box-shadow: 0 32px 80px rgba(0,0,0,.5);
            position: relative; overflow: hidden;
        }
        .login-box::before {
            content: ''; position: absolute; top: -60px; right: -60px;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(255,92,0,.15), transparent 65%);
            pointer-events: none;
        }
        .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; }
        .logo span { color: var(--orange); }
        .badge-admin { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,92,0,.12); border: 1px solid var(--orange-border); color: var(--orange); padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 32px; }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; }
        .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 10px; padding: 13px 16px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 14px; outline: none; transition: border-color .2s; }
        .form-input:focus { border-color: var(--orange); }
        .form-input::placeholder { color: var(--text3); }
        .btn-login { width: 100%; background: var(--orange); color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all .2s; margin-top: 8px; }
        .btn-login:hover { background: var(--orange-light); transform: translateY(-1px); }
        .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }
        .error-msg { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: #ef4444; border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 12px; display: none; }
        .hint-box { background: var(--bg4); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-top: 20px; font-size: 12px; color: var(--text2); }
        .hint-box strong { color: var(--text); }
        .hint-box .cred { font-family: monospace; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; color: var(--orange); }
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .divider span { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; }
        .btn-quick { width: 100%; background: transparent; border: 1px solid var(--border2); color: var(--text2); border-radius: 10px; padding: 13px; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-quick:hover { border-color: var(--orange); color: var(--orange); }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">Sneak<span>X</span></div>
        <div class="badge-admin"><i class="fas fa-shield-alt"></i> Espace Administrateur</div>

        <div class="form-group">
            <label class="form-label">Email administrateur</label>
            <input type="email" class="form-input" id="email" placeholder="admin@sneakx.com" value="admin@sneakx.com">
        </div>
        <div class="form-group">
            <label class="form-label">Mot de passe</label>
            <input type="password" class="form-input" id="password" placeholder="••••••••" value="Admin123!" onkeydown="if(event.key==='Enter') login()">
        </div>

        <button class="btn-login" id="loginBtn" onclick="login()">
            <i class="fas fa-lock"></i> Accéder au panneau admin
        </button>

        <div class="error-msg" id="errorMsg"></div>

        <div class="divider"><span>ou</span></div>

        <button class="btn-quick" onclick="quickAccess()">
            <i class="fas fa-bolt" style="color:var(--orange)"></i>
            Accès rapide (mode démo)
        </button>

        <div class="hint-box">
            <div style="margin-bottom:6px"><i class="fas fa-info-circle" style="color:var(--orange);margin-right:5px"></i><strong>Identifiants démo</strong></div>
            Email : <span class="cred">admin@sneakx.com</span><br>
            Mot de passe : <span class="cred">Admin123!</span>
        </div>
    </div>

    <script>
        const ADMIN_EMAIL = 'admin@sneakx.com';
        const ADMIN_PASSWORD = 'Admin123!';

        // Fake JWT token payload for admin
        function makeFakeToken(user) {
            const header = btoa(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
            const payload = btoa(JSON.stringify({
                sub: user.id,
                email: user.email,
                role: user.role,
                exp: Math.floor(Date.now() / 1000) + 86400 * 7 // 7 days
            }));
            const sig = btoa('sneakx-demo-signature');
            return `${header}.${payload}.${sig}`;
        }

        function injectAdminSession() {
            const adminUser = {
                id: 1,
                name: 'Admin SneakX',
                first_name: 'Admin',
                email: ADMIN_EMAIL,
                role: 'ADMIN',
                status: 'ACTIVE',
                avatar: null
            };
            const token = makeFakeToken(adminUser);
            localStorage.setItem('access_token', token);
            localStorage.setItem('refresh_token', token);
            localStorage.setItem('user', JSON.stringify(adminUser));
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            document.getElementById('errorMsg').style.display = 'none';

            if (!email || !password) {
                showError('Veuillez remplir tous les champs.');
                return;
            }

            // Simulate loading
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Vérification...';

            setTimeout(() => {
                if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
                    injectAdminSession();
                    btn.innerHTML = '<i class="fas fa-check"></i> Accès accordé !';
                    btn.style.background = '#10b981';
                    setTimeout(() => {
                        window.location.href = 'commandes.html';
                    }, 600);
                } else {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-lock"></i> Accéder au panneau admin';
                    showError('Email ou mot de passe incorrect. Utilisez les identifiants démo.');
                }
            }, 1200);
        }

        function quickAccess() {
            injectAdminSession();
            window.location.href = 'commandes.html';
        }

        // If already logged in as admin, redirect
        try {
            const user = JSON.parse(localStorage.getItem('user') || 'null');
            const token = localStorage.getItem('access_token');
            if (user && user.role === 'ADMIN' && token) {
                const payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp * 1000 > Date.now()) {
                    window.location.href = 'commandes.html';
                }
            }
        } catch(e) {}
    </script>
</body>
</html>
