<!-- Fichier: /frontend/pages/notifications.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications — SneakX</title>
    <link rel="stylesheet" href="../assets/css/design-system.css">
    <link rel="stylesheet" href="../assets/css/accessibility.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-wrap { padding: 100px 60px 60px; max-width: 860px; margin: 0 auto; }
        .page-head { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
        .page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 52px; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; }
        .page-title span { color: var(--orange); }
        .notif-count { display: inline-flex; align-items: center; justify-content: center; background: var(--orange); color: #fff; font-size: 12px; font-weight: 800; min-width: 22px; height: 22px; border-radius: 11px; padding: 0 6px; margin-left: 10px; vertical-align: middle; }
        .filters-bar { background: var(--bg3); border: 1px solid var(--border); border-radius: 14px; padding: 16px 20px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .filter-tab { padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; font-weight: 600; letter-spacing: .5px; cursor: pointer; transition: all .2s; }
        .filter-tab:hover { border-color: var(--text2); color: var(--text); }
        .filter-tab.active { background: var(--orange); border-color: var(--orange); color: #fff; }
        .filter-right { margin-left: auto; }
        .mark-all-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 11px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; cursor: pointer; transition: all .2s; display: inline-flex; align-items: center; gap: 6px; }
        .mark-all-btn:hover { border-color: var(--orange); color: var(--orange); }
        .notif-group { margin-bottom: 28px; }
        .notif-group-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; padding-left: 4px; }
        .notif-item { display: flex; align-items: flex-start; gap: 16px; padding: 18px 20px; border-radius: 14px; border: 1px solid var(--border); background: var(--bg3); margin-bottom: 8px; transition: all .2s; cursor: pointer; position: relative; }
        .notif-item:hover { border-color: var(--orange-border); transform: translateX(4px); }
        .notif-item.unread { border-color: rgba(255,92,0,.2); }
        .notif-item.unread::before { content: ''; position: absolute; left: -1px; top: 20px; bottom: 20px; width: 3px; background: var(--orange); border-radius: 0 2px 2px 0; }
        .notif-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .notif-icon.ORDER { background: rgba(59,130,246,.15); color: #3b82f6; }
        .notif-icon.PAYMENT { background: rgba(16,185,129,.15); color: #10b981; }
        .notif-icon.PROMOTION { background: rgba(255,92,0,.15); color: var(--orange); }
        .notif-icon.SYSTEM { background: rgba(139,92,246,.15); color: #8b5cf6; }
        .notif-icon.ALERT { background: rgba(239,68,68,.12); color: #ef4444; }
        .notif-body { flex: 1; min-width: 0; }
        .notif-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .notif-msg { font-size: 13px; color: var(--text2); line-height: 1.55; }
        .notif-time { font-size: 11px; color: var(--text3); margin-top: 8px; }
        .notif-dismiss { position: absolute; top: 14px; right: 14px; width: 28px; height: 28px; border-radius: 6px; background: transparent; border: none; color: var(--text3); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
        .notif-dismiss:hover { background: var(--bg4); color: var(--text2); }
        .unread-dot { width: 8px; height: 8px; background: var(--orange); border-radius: 50%; flex-shrink: 0; margin-top: 8px; }
        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-state i { font-size: 56px; color: var(--text3); display: block; margin-bottom: 20px; }
        .empty-state h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 800; text-transform: uppercase; }
        .empty-state p { color: var(--text2); font-size: 14px; margin-top: 8px; }
        @media(max-width:768px){ .page-wrap{padding:80px 16px 40px} .page-head{flex-direction:column;align-items:flex-start} }
    </style>
</head>
<body>
    <div id="sx-header-placeholder"></div>
    <div class="page-wrap">
        <div class="page-head reveal">
            <div>
                <div class="page-title">Notifi<span>cations</span><span class="notif-count" id="unreadBadge">0</span></div>
            </div>
        </div>
        <div class="filters-bar reveal">
            <button class="filter-tab active" onclick="filterType('all',this)">Toutes</button>
            <button class="filter-tab" onclick="filterType('ORDER',this)"><i class="fas fa-box" style="margin-right:5px"></i>Commandes</button>
            <button class="filter-tab" onclick="filterType('PAYMENT',this)"><i class="fas fa-wallet" style="margin-right:5px"></i>Paiements</button>
            <button class="filter-tab" onclick="filterType('PROMOTION',this)"><i class="fas fa-tag" style="margin-right:5px"></i>Promos</button>
            <button class="filter-tab" onclick="filterType('SYSTEM',this)"><i class="fas fa-cog" style="margin-right:5px"></i>Système</button>
            <div class="filter-right">
                <button class="mark-all-btn" onclick="markAll()"><i class="fas fa-check-double"></i> Tout lire</button>
            </div>
        </div>
        <div id="notifContainer"></div>
    </div>

    <script type="module">
        import { init, showToast } from '../assets/js/modules/sx-shared.js';
        import { NotifSim } from '../assets/js/modules/sim-engine.js';
        init('notifications');

        let currentType = 'all';

        function timeAgo(iso) {
            const diff = (Date.now() - new Date(iso)) / 1000;
            if (diff < 60) return 'À l\'instant';
            if (diff < 3600) return Math.floor(diff / 60) + ' min';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h';
            return Math.floor(diff / 86400) + 'j';
        }

        function render() {
            const type = currentType === 'all' ? null : currentType;
            const notifs = NotifSim.getAll(type);
            const unread = NotifSim.unreadCount();

            document.getElementById('unreadBadge').textContent = unread;
            document.getElementById('unreadBadge').style.display = unread > 0 ? 'inline-flex' : 'none';

            const container = document.getElementById('notifContainer');

            if (!notifs.length) {
                container.innerHTML = `<div class="empty-state">
                    <i class="fas fa-bell-slash"></i>
                    <h3>Aucune notification</h3>
                    <p>Vous n'avez pas encore de notification${currentType !== 'all' ? ' dans cette catégorie' : ''}.</p>
                </div>`;
                return;
            }

            // Group by today/earlier
            const today = new Date().toDateString();
            const todayNotifs = notifs.filter(n => new Date(n.created_at).toDateString() === today);
            const olderNotifs = notifs.filter(n => new Date(n.created_at).toDateString() !== today);

            let html = '';
            if (todayNotifs.length) {
                html += `<div class="notif-group"><div class="notif-group-label">Aujourd'hui</div>
                    ${todayNotifs.map(n => renderNotif(n)).join('')}</div>`;
            }
            if (olderNotifs.length) {
                html += `<div class="notif-group"><div class="notif-group-label">Plus tôt</div>
                    ${olderNotifs.map(n => renderNotif(n)).join('')}</div>`;
            }

            container.innerHTML = html;
        }

        function renderNotif(n) {
            return `<div class="notif-item ${n.read ? '' : 'unread'}" onclick="markRead('${n.id}')">
                <div class="notif-icon ${n.type}"><i class="fas ${n.icon || 'fa-bell'}"></i></div>
                <div class="notif-body">
                    <div class="notif-title">${n.title}</div>
                    <div class="notif-msg">${n.message}</div>
                    <div class="notif-time"><i class="fas fa-clock" style="margin-right:4px;opacity:.5"></i>${timeAgo(n.created_at)}</div>
                </div>
                ${n.read ? '' : '<div class="unread-dot"></div>'}
                <button class="notif-dismiss" onclick="event.stopPropagation();dismiss('${n.id}')"><i class="fas fa-times"></i></button>
            </div>`;
        }

        window.filterType = (type, el) => {
            currentType = type;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            render();
        };

        window.markRead = (id) => { NotifSim.markRead(id); render(); };
        window.dismiss = (id) => { NotifSim.dismiss(id); showToast('Notification supprimée', 'info'); render(); };
        window.markAll = () => { NotifSim.markAllRead(); showToast('Toutes les notifications marquées comme lues', 'success'); render(); };

        // Live updates
        window.addEventListener('sx-notification', () => render());

        render();
    </script>
</body>
</html>
